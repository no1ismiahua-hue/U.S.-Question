<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球站趣味问答破冰之旅</title>
    <style>
        :root {
            --primary-color: #059669;
            --bg-color: #f0fdf4;
            --card-border: #a7f3d0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", sans-serif;
            background-color: #f4f7f5;
            color: #334155;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 20px;
            box-sizing: border-box;
        }

        /* 统一头部展示 */
        .app-header {
            text-align: center;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 24px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .app-header h1 {
            font-size: 20px;
            margin: 0 0 8px 0;
        }

        .app-header p {
            font-size: 13px;
            margin: 0;
            opacity: 0.9;
        }

        /* 隐藏不该显示的步骤 */
        .step-page {
            display: none;
        }

        .step-page.active {
            display: block;
        }

        /* 答题页面样式 */
        .progress-bar {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 15px;
            text-align: right;
        }

        .question-text {
            font-size: 17px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 15px;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:active {
            background-color: #e2e8f0;
        }

        /* 表单页面样式 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 提示弹窗 */
        .alert-box {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        /* ===== 清新可爱风格卡片样式 ===== */
        .card-cute {
            background: #ffffff;
            border: 3px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(167, 243, 208, 0.3);
            margin-top: 10px;
        }

        .card-cute .card-header {
            background-color: var(--bg-color);
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            color: #047857;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .card-cute .info-row {
            margin-bottom: 14px;
            background: #fdfbf7;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
        }

        .card-cute .info-label {
            color: #059669;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .card-cute .info-value {
            color: #334155;
            font-size: 15px;
        }

        .card-cute .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .card-cute .badge {
            background-color: #e6f4ea;
            color: #137333;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="app-header">
        <h1 id="header-title">全球站·趣味问答</h1>
        <p id="header-desc">解锁你的专属飞行日志卡片</p>
    </div>

    <div id="alert-msg" class="alert-box"></div>

    <div id="quiz-page" class="step-page active">
        <div class="progress-bar" id="progress-text">第 1 / 10 题</div>
        <div class="question-text" id="question-text">正在加载题目...</div>
        <div id="options-container">
            </div>
    </div>

    <div id="form-page" class="step-page">
        <div style="text-align: center; margin-bottom: 20px;">
            <span style="font-size: 40px;">🎉</span>
            <h3 style="margin: 10px 0 0 0; color: #059669;">恭喜全部答对！</h3>
            <p style="font-size: 13px; color: #64748b; margin: 4px 0 0 0;">请填写你的个人档案，定制可爱风卡片吧</p>
        </div>
        
        <div class="form-group">
            <label>🏷️ 名字/昵称</label>
            <input type="text" id="input-name" placeholder="例如：小丸子 (Mengmeng)">
        </div>
        <div class="form-group">
            <label>📍 来自哪个城市</label>
            <input type="text" id="input-city" placeholder="例如：杭州 · Hangzhou">
        </div>
        <div class="form-group">
            <label>🎨 兴趣爱好（逗号分隔，生成可爱标签）</label>
            <input type="text" id="input-hobbies" placeholder="例如：独自背包客, 搜罗满分甜品, 收集日落">
        </div>
        <div class="form-group">
            <label>✨ 破冰暗号 / 结伴宣言</label>
            <textarea id="input-slogan" rows="2" placeholder="例如：行程中如果有好看的咖啡馆，叫上我呀！☕️"></textarea>
        </div>

        <button class="submit-btn" onclick="generateCard()">生成我的好友卡片</button>
    </div>

    <div id="card-page" class="step-page">
        <div class="card-cute">
            <div class="card-header">✈️ 全球飞行日志 · 遇见新朋友</div>
            
            <div class="info-row">
                <div class="info-label">🏷️ 名字叫啥：</div>
                <div class="info-value" id="card-name"></div>
            </div>

            <div class="info-row">
                <div class="info-label">📍 来自哪里：</div>
                <div class="info-value" id="card-city"></div>
            </div>

            <div class="info-row">
                <div class="info-label">🎨 超爱做的事：</div>
                <div class="badge-container" id="card-hobbies">
                    </div>
            </div>
            
            <div style="text-align: center; font-size: 13px; color: #059669; margin-top: 20px; font-weight: 500;" id="card-slogan">
            </div>
        </div>

        <button class="submit-btn" style="background-color: #3b82f6; margin-top: 20px;" onclick="window.location.reload()">再玩一次</button>
    </div>

</div>

<script>
    // 完整的10道题库数据
    const quizData = [
        { q: "此次出行的目的地及整体行程时间是什么？", o: ["A. 全球站（英国）：7月13日 - 7月17日", "B. 全球站（美国）：5月27日 - 5月31日", "C. 香港站：8月9日 - 8月13日", "D. 纽约站：5月20日 - 5月25日"], a: 1 },
        { q: "关于行前准备中的“证件与资金”，以下哪项描述是错误的？", o: ["A. 需携带护照原件（有效期6个月以上）", "B. 建议准备少量美金现金（如100-200刀）", "C. 信用卡只需携带国内单银联卡即可，无需双币卡", "D. 建议将重要证件拍照留存电子版"], a: 2 },
        { q: "在酒店入住与设施方面，以下哪项是美国酒店通常不主动提供、需要倡导自备的？", o: ["A. 沐浴露与洗发水", "B. 拖鞋与牙膏牙刷", "C. 吹风机", "D. 毛巾与地垫"], a: 1 },
        { q: "关于当地的通信与上网，手册中推荐的官方网络流量解决方案是什么？", o: ["A. 必须在当地机场排队购买实体SIM卡", "B. 推荐全程使用随身Wi-Fi设备", "C. 建议提前开通国际漫游或购买天数随心包，并注意关闭不必要的后台刷新", "D. 只能在有免费Wi-Fi覆盖的场所上网"], a: 2 },
        { q: "关于美国的“小费文化”，以下哪种场景和对应的小费标准是符合手册建议的？", o: ["A. 快捷餐馆/打包带走：无需特殊支付", "B. 晚餐/正餐（服务良好）：总账单的 15% - 20%", "C. 酒店行李员：通常1-2美金/件", "D. 以上场景和标准皆符合手册建议"], a: 3 },
        { q: "根据手册中的“紧急联络与安全提示”，如在当地遭遇治安突发紧急情况，应拨打的美国求助电话是？", o: ["A. 110", "B. 911", "C. 120", "D. 119"], a: 1 },
        { q: "针对本次日常行程的着装建议，以下哪项最符合手册倡导的原则？", o: ["A. 必须每天穿着全套正式商务西装", "B. 以舒适、便于走动为主（Smart Casual），并准备外套应对温差或冷气", "C. 全程只能穿全套运动服", "D. 仅携带短袖夏装即可"], a: 1 },
        { q: "在商务活动、正式晚宴（Gala Dinner）等特定场合，手册中提示的着装要求（Dress Code）通常是？", o: ["A. 休闲短裤与沙滩拖鞋", "B. 宽松版运动套装", "C. 正装 / 鸡尾酒礼服 (Business Formal / Cocktail Dress)", "D. 居家睡衣风格"], a: 2 },
        { q: "出行前关于“健康与常用药”的准备，手册给出的建议是？", o: ["A. 统一由随行工作组提供，个人无需携带", "B. 建议根据个人情况携带感冒药等常备药，并注意美国海关违禁成分限制", "C. 任何国内药品都可以随意带入海关无需申报", "D. 国外买药方便，不需要自己准备"], a: 1 },
        { q: "关于时差与行程调整，本次目的地与北京时间的关系是？", o: ["A. 目的地时间比北京时间快 2 小时", "B. 目的地与北京时间处于同一时区", "C. 目的地比北京时间慢十几个小时，需注意调整作息以缓解时差反应", "D. 目的地正好比北京时间快 12 小时"], a: 2 }
    ];

    let currentQuestionIndex = 0;

    // 初始化题目
    function loadQuestion() {
        const alertBox = document.getElementById('alert-msg');
        alertBox.style.display = 'none'; // 隐藏错误提示

        if (currentQuestionIndex < quizData.length) {
            document.getElementById('progress-text').innerText = `第 ${currentQuestionIndex + 1} / 10 题`;
            const currentQuestion = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQuestion.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            currentQuestion.o.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option;
                button.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(button);
            });
        } else {
            // 通关，进入表单页
            switchPage('form-page');
            document.getElementById('header-title').innerText = "通关成功 🎉";
            document.getElementById('header-desc').innerText = "做卡片，交朋友";
        }
    }

    // 检查答案（错一题就重新来，符合全对通关硬核玩法）
    function checkAnswer(selectedIndex) {
        const currentQuestion = quizData[currentQuestionIndex];
        if (selectedIndex === currentQuestion.a) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            const alertBox = document.getElementById('alert-msg');
            alertBox.innerText = `❌ 答错了哟！再仔细看下出行手册，重新挑战吧～`;
            alertBox.style.display = 'block';
            currentQuestionIndex = 0; // 重置进度
            setTimeout(() => { loadQuestion(); }, 1500);
        }
    }

    // 页面切换引擎
    function switchPage(pageId) {
        document.querySelectorAll('.step-page').forEach(page => page.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // 抓取表单，渲染清新可爱风卡片
    function generateCard() {
        const name = document.getElementById('input-name').value.trim() || '神秘旅客';
        const city = document.getElementById('input-city').value.trim() || '未知城市';
        const hobbiesText = document.getElementById('input-hobbies').value.trim() || '旅游, 美食';
        const slogan = document.getElementById('input-slogan').value.trim() || 'Hello World! ✨';

        // 渲染基础信息
        document.getElementById('card-name').innerText = name;
        document.getElementById('card-city').innerText = city;
        document.getElementById('card-slogan').innerText = `✨ “${slogan}”`;

        // 处理爱好标签
        const hobbiesArray = hobbiesText.split(/[,，]/); // 支持中英文逗号分隔
        const badgeContainer = document.getElementById('card-hobbies');
        badgeContainer.innerHTML = '';
        hobbiesArray.forEach(hobby => {
            if(hobby.trim()) {
                const span = document.createElement('span');
                span.className = 'badge';
                span.innerText = hobby.trim();
                badgeContainer.appendChild(span);
            }
        });

        // 切换到卡片页面
        switchPage('card-page');
        document.getElementById('header-title').innerText = "你的全球伙伴卡片";
        document.getElementById('header-desc').innerText = "长按手机屏幕可以截图保存哦！";
    }

    // 首次加载
    window.onload = loadQuestion;
</script>

</body>
</html>
